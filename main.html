<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- Daisy UI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Font---->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--Style---->
    <link rel="stylesheet" href="style.css">

    <!--favicon-->
    <link rel="icon" type="image/x-icon" href="assets/github-logo.png">

    <!--Font Awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <header>
        <nav>
        <!--navbar-->
        <div class=" navbar bg-base-100 shadow-sm flex justify-between p-5">
             <!--logo & text-->
              <div class="flex gap-4">
                 
                <div class="flex justify-center items-center">
                  <img class="w-9 h-9 mb-4" src="assets/github-logo.png" alt="github-logo">
                 </div>
                 
                 <div class="text-center">
                   <h1 class="text-2xl font-semibold mb-1">GitHub Issues Tracker</h1> 
                 </div>

              </div>

            <!--search & new issue-->
            <div class="flex gap-12">
                
                <input id="search-input" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                
                <button class="btn btn-primary">+ New Issue</button>
            
            </div>
        </div>
        </nav>
    </header>

    <!--All,Open,CLosed-->
    <section>
    <div class="rounded-xl bg-base-200 h-20 m-8 flex justify-start ">
        <div class="btn-group flex gap-4 pt-4 pl-4">
            <button id="all-btn"  class="btn w-28 h-10">All</button>
            <button id="open-btn" class="btn w-28 h-10">Open</button>
            <button id="closed-btn" class="btn w-28 h-10">Closed</button>
        </div>
    </div>
    </section>

    <section>
        <div class=" rounded-xl bg-base-200  m-8 flex justify-between ">
             <!--logo & text-->
              <div class="flex gap-4 p-10">
                 
                <div class="flex justify-center items-center">
                  <img class="w-9 h-9 mb-4" src="assets/Aperture.png" alt="Aperture-logo">
                 </div>
                 
                 <div class="">
                   <h1 class="text-2xl font-semibold mb-1"><span id="issue-count">50</span> Issues</h1> 
                   <h1 class="text-xl font-semibold mb-1 text-slate-500">Track and manage your project issues</h1> 
                 </div>

              </div>

            <!--Open & Closed-->
            <div class="flex gap-12 my-auto mr-6">
                <div class="flex justify-center gap-2">
                <img class="w-3 h-3 rounded-full my-auto" src="assets/artistic-blurry-colorful-wallpaper-background.jpg" alt="open">
                <p class="flex justify-center my-auto">Open</p>
                </div>

                <div class="flex justify-center gap-2">
                <img class="w-3 h-3 rounded-full my-auto" src="assets/studio-background-concept-abstract-empty-light-gradient-purple-studio-room-background-product.jpg" alt="open">
                <p class="flex justify-center my-auto">Closed</p>
                </div>
            
            </div>
        </div>

        <!--cards-->
        <div id="issue-container" class="flex justify-center items-center flex-wrap gap-4 bg-base-200 -my-3 ml-8 mr-8">
        




       
        
        

        </div>
        
    </section>



<dialog id="my_modal_1" class="modal">
  
</dialog>
    



    <script src="index.js"></script>
</body>
</html>
